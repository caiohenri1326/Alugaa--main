<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registre-se | Alugaaê</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../page-registro/style.css">
    <link rel="icon" href="../../assets/LOGO_ALUGAÊ-removebg-preview.png" type="image/png">
</head>
<body>
    <div class="box-registro">
            <button class="voltar-homepage"><i class="bi bi-arrow-left"></i> Voltar para o início</button>
            <img src="../../assets/LOGO_ALUGAÊ-removebg-preview.png">
            
            <h6>Crie sua conta</h6>
            <p>Preencha os dados abaixo para se cadastrar</p>

            <form class="form-registro">
                <label>Nome completo</label>
                <i class="bi bi-person"></i>
                <input type="text" placeholder="João da Silva" class="nome" id="novamente" required>

                <label>E-mail</label>
                <i class="bi bi-envelope"></i>
                <input type="email" placeholder="seu@email.com" class="email" id="email" required>
                
                <label>Senha</label>
                <i class="bi bi-lock icon-lock1"></i>
                <input type="password" placeholder="Minimo 6 caracteres" class="senha" id="senha" required>

                <label>Confirmar Senha</label>
                <i class="bi bi-lock icon-lock2"></i>
                <input type="password" placeholder="Digite a senha novamente" class="senha2" required>

                <button type="submit">Criar Conta</button>
                
                <hr style="margin-top: 30px; max-width: 100%; margin-left: 60px; color: rgba(0, 0, 0, 0.767);">
                <p>Já tem uma conta? <a href="../login-page/index.html">Faça login</a></p>
                </div>
            </form>
            
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>

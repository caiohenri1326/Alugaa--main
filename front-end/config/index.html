<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações | Alugaê</title>
    <link rel="stylesheet" href="../config/style.css">
    <link rel="stylesheet" href="../config/css-perfil/perfil-css.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="icon" href="../../assets/gear-fill.svg" type="icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container-img">
           <img src="../../assets/LOGO_ALUGAÊ-removebg-preview.png">
            <p>Alugaê</p> 
        </div>
        <div class="container-botao-divisoria">
            <button id="divisao-container-esquerdo" style="border: none; background: none; width: 50px; height: 50px; margin-top: 18px; cursor: pointer;"><i class="bi bi-layout-sidebar-reverse"></i></button>
            <span id="text-area">Area</span>
        </div>
        <div class="buttons-header">
            <button class="button-anunciar"><i class="bi bi-bag-plus"></i>Anunciar</button>
            <button class="icon-sino"><i class="bi bi-bell"></i></button>
            <img src="../../assets/eu.jpg" class="img-perfil">
        </div>
    </header>
    <hr style="background-color: rgba(0, 0, 0, 0.176); border: none; opacity: 1; height: 1px; margin-top: 0;" class="hr-vertical">
    <div class="divisao-vertical" id="divisao-vertical"></div>



    <div class="config-sidebar" id="config-sidebar">
        <ul class="nav nav-pills flex-column">
            <li class="nav-item" id="tela-perfil">
                <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tela-perfil" id="botao-ativar-perfil">
                    <i class="bi bi-person"></i> Perfil
                </button>
            </li>
            
            <li class="nav-item" id="tela-conta">
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tela-conta">
                    <i class="bi bi-gear"></i> Conta
                </button>
            </li>

            <li class="nav-item" id="tela-aparencia">
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tela-aparencia">
                    <i class="bi bi-palette"></i> Aparência
                </button>
            </li>

            <li class="nav-item" id="tela-enderecos">
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tela-enderecos">
                    <i class="bi bi-geo-alt"></i> Endereços
                </button>
            </li>

            <li class="nav-item" id="tela-seguranca">
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tela-seguranca">
                    <i class="bi bi-key"></i> Segurança
                </button>
            </li>

            <li class="nav-item" id="tela-privacidade">
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tela-privacidade">
                    <i class="bi bi-shield-check"></i> Privacidade
                </button>
            </li>

            <hr class="my-3">

            <li class="nav-item container-exit" id="container-exit">
                <a href="../login/index.html" class="nav-link text-danger">
                    <i class="bi bi-box-arrow-right"></i> Sair
                </a>
            </li>
        </ul>
</div>





<!-- AREA VISUAL PERFIL -->

<div class="container-perfil" id="container-perfil">
    <div class="infos">
        <p style="font-size: 23px; margin-left: 25px; margin-top: 35px;">Foto de Perfil</p>
        
        <div class="container-infos-pessoais">
            <span id="nomePessoa">Nome da Pessoa</span>
            <p class="text-member">Membro desde <span>Data que a pessoa entrou</span></p>
        </div>
        
        <div class="perfil-header">
            <img src="../../assets/eu.jpg">
            <input type="file" value="" id="upload-foto" style="display: none;"></input>
            <label for="upload-foto" class="botao-foto"><i class="bi bi-camera"></i></label>
        </div>
    </div>
    

    <div class="info-pessoais">
        <p>Informações Pessoais</p>
        <div class="nome">
            <label for="Nome">Nome Completo</label>
            <input type="text" placeholder="Digite seu Nome">
        </div>

        <div class="fone-city">
            <div class="fone">
                <label for="">Telefone</label>
                <input type="number" placeholder="(11) 99999-9999">
            </div>
    
            <div class="cidade">
                <label>Cidade</label>
                <input type="text" placeholder="São Paulo, SP">
            </div>

        </div>

        <div class="bio">
            <label>Bio</label>
            <textarea placeholder="Conte um pouco sobre você..."></textarea>
        </div>
        
    </div>
    <div class="container-botoes-env">
        <button class="cancelar">Cancelar</button>
        <button class="env">Salvar alterações</button>
    </div>
</div>
<!------------------------------------------------------------------------------------------------------------------>

<script src="../config/script.js"></script>
</body>
</html>

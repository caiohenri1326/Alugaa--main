<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../config/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <header>
        <div>
           <img src="../../assets/LOGO_ALUGAÊ-removebg-preview.png">
            <p>Alugaê</p> 
        </div>
        <div>
            <i class="bi bi-layout-sidebar-reverse"></i>
            <span>Area</span>
        </div>
        <div class="buttons-header">
            <button><i class="bi bi-bag-plus"></i>Anunciar</button>
            <button><i class="bi bi-bell"></i></button>
            <img src="../../assets/eu.jpg">
        </div>
    </header>
    <div class="config-sidebar">
    <ul class="nav nav-pills flex-column">
        <li class="nav-item" id="tela-perfil">
            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tela-perfil">
                <i class="bi bi-person-circle"></i> Perfil
            </button>
        </li>
        
        <li class="nav-item" id="tela-conta">
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tela-conta">
                <i class="bi bi-gear-fill"></i> Conta
            </button>
        </li>

        <li class="nav-item" id="tela-aparencia">
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tela-aparencia">
                <i class="bi bi-palette-fill"></i> Aparência
            </button>
        </li>

        <li class="nav-item" id="tela-enderecos">
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tela-enderecos">
                <i class="bi bi-geo-alt-fill"></i> Endereços
            </button>
        </li>

        <li class="nav-item" id="tela-seguranca">
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tela-seguranca">
                <i class="bi bi-key-fill"></i> Segurança
            </button>
        </li>

        <li class="nav-item" id="tela-privacidade">
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#tela-privacidade">
                <i class="bi bi-shield-fill-check"></i> Privacidade
            </button>
        </li>

        <hr class="my-3">

        <li class="nav-item">
            <a href="../login/index.html" class="nav-link text-danger">
                <i class="bi bi-box-arrow-left"></i> Sair
            </a>
        </li>
    </ul>
</div>





<!-- AREA VISUAL PERFIL -->

<div class="container-perfil">
    <p>Foto de Perfil</p>
    <img src="../../assets/eu.jpg">

    <div class="info-pessoal">
        <div class="nome">
            <label for="Nome">Nome Completo</label>
            <input type="text" placeholder="Digite seu Nome">
        </div>

        <div class="fone">
            <label for=""></label>
            <input type="number" placeholder="(11) 99999-9999">
        </div>

        <div class="cidade">
            <label>Cidade</label>
            <input type="text" placeholder="São Paulo, SP">
        </div>

        <div class="bio">
            <label>Bio</label>
            <input type="text" placeholder="Conte um pouco sobre você...">
        </div>
    </div>
</div>


<script src="../config/script.js"></script>
</body>
</html>
